version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    environment:
      # These credentials will be used if you want to create a specific user/db.
      # By default, ClickHouse creates a 'default' user with an empty password.
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD="" 
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123" # HTTP port (used by clickhouse-connect default)
      - "9000:9000" # Native port for clickhouse-client
    volumes:
      # Data directory (will be stored in Docker Root Dir which is on external drive)
      - clickhouse_data:/var/lib/clickhouse
      # Initialization scripts mapped from local project
      - ./clickhouse/initdb:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  clickhouse_data:
